<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b5471f"/>
      <stop offset="1" stop-color="#8f3414"/>
    </linearGradient>
  </defs>
  <!-- 圆角方底，呼应站点 brand-mark -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#bg)"/>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="none" stroke="#1f1b16" stroke-width="2.5"/>
  <!-- 大写 Sigma -->
  <path d="M44 17 H22 L34 32 L22 47 H44"
        fill="none" stroke="#f4efe4" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round"/>
  <!-- 金色小数点，象征 π / 题目 -->
  <circle cx="46.5" cy="46.5" r="3.2" fill="#c98a16"/>
</svg>
